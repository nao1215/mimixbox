name: IntegrationTest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  integration_test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SHELLSPEC_VERSION: "0.28.1"
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Pin ShellSpec to a tagged release (instead of an unpinned `curl | sh`
      # against master) so the integration job is reproducible.
      - name: SetupShellScript
        run: |
          git clone --depth 1 --branch "${SHELLSPEC_VERSION}" https://github.com/shellspec/shellspec.git "$HOME/shellspec"
          echo "$HOME/shellspec/bin" >> "$GITHUB_PATH"

      # `make it` (test-e2e) builds MimixBox and stages its applet symlinks in an
      # isolated PATH directory itself, so the workflow and the local target
      # exercise the exact same hermetic environment.
      - name: IntegrationTest
        run: make it
