name: Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Builds the Docker image from the local source tree to guarantee that
# "build mimixbox in Docker" keeps working (GitHub issue #4). The image's
# Dockerfile compiles MimixBox inside the golang toolchain image, so a broken
# go.mod or build step fails this job.
jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Build the Docker image from local source
        run: docker image build -t mimixbox/ci:${{ github.sha }} .

      - name: Verify the in-image binary runs
        run: |
          docker container run --rm mimixbox/ci:${{ github.sha }} mimixbox --version
          docker container run --rm mimixbox/ci:${{ github.sha }} mimixbox --list

      - name: Smoke test real applets
        run: |
          set -euxo pipefail

          # echo applet must print exactly what it is given.
          out="$(docker container run --rm mimixbox/ci:${{ github.sha }} echo hello mimixbox)"
          test "$out" = "hello mimixbox"

          # cat applet must reproduce the contents of a file written by another
          # applet, exercising a real read/write path inside the image.
          out="$(docker container run --rm mimixbox/ci:${{ github.sha }} \
            /bin/bash -c 'printf "line1\nline2\n" > /tmp/smoke.txt && cat /tmp/smoke.txt')"
          test "$out" = "$(printf 'line1\nline2')"

          # basename applet must strip the directory and suffix.
          out="$(docker container run --rm mimixbox/ci:${{ github.sha }} basename /usr/local/bin/mimixbox)"
          test "$out" = "mimixbox"
