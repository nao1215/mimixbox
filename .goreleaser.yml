version: 2
project_name: mimixbox
env:
  - GO111MODULE=on
before:
  hooks:
    - go mod tidy
    - go generate ./...
builds:
  - main: ./cmd/mimixbox
    ldflags:
      - -s -w
      - -X github.com/nao1215/mimixbox/internal/version.Version={{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    # Wrap the contents in a single directory and bundle the self-contained
    # installer so `tar xf ...; cd ...; sudo ./installer.sh` works from a plain
    # extracted archive (GitHub issue #267).
    wrap_in_directory: true
    files:
      - LICENSE
      - README.md
      - src: scripts/installer.sh
        strip_parent: true
        info:
          mode: 0755
      - src: scripts/libshell.sh
        strip_parent: true
checksum:
  name_template: "checksums.txt"
snapshot:
  version_template: "{{ incpatch .Version }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
nfpms:
  - maintainer: Naohiro CHIKAMATSU <n.chika156@gmail.com>
    description: MimixBox - mimic BusyBox on Linux
    homepage: https://github.com/nao1215/mimixbox
    license: Apache-2.0 license
    formats:
      - deb
      - rpm
      - apk
