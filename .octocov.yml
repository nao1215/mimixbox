# generated by octocov init
coverage:
  if: true
  paths:
    - cover.out
  exclude:
    - "**/main.go"
codeToTestRatio:
  if: true
testExecutionTime:
  if: true
diff:
  datastores:
    - artifact://${GITHUB_REPOSITORY}
comment:
  if: is_pull_request
  hideFooterLink: false
summary:
  if: true
report:
  if: is_default_branch
  datastores:
    - artifact://${GITHUB_REPOSITORY}
